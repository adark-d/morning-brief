# Production overrides — applied on top of default.yaml.
# Secrets and recipient lists come from env vars, NOT from this file.

environment: production

llm:
  model: claude-opus-4-7
  max_tokens: 2000
  timeout_seconds: 30.0
  max_retries: 1

delivery:
  channels: [email]
  duplicate_prevention_enabled: true
  # email.smtp_host, email.smtp_port, email.smtp_from injected via env vars,
  # e.g. MORNING_BRIEF_DELIVERY__EMAIL__SMTP_HOST

audit:
  backend: json
  # json_store_path should point at a persistent volume in deployment, e.g.
  # MORNING_BRIEF_AUDIT__JSON_STORE_PATH=/var/lib/morning-brief/audit
  json_store_path: ./audit/prod

observability:
  log_level: INFO
  json_logs: true
  metrics_enabled: true
