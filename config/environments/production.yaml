# Production overrides — applied on top of default.yaml.
# Secrets and recipient lists come from env vars, NOT from this file.

environment: production

llm:
  model: claude-opus-4-7
  max_tokens: 2000
  # Opus generating the full structured brief routinely needs >30s; 120s covers it.
  # Coupled to the Lambda timeout (lambda_timeout_seconds in infra/envs/prod): the
  # function must outlive primary + fallback both exhausting this budget.
  timeout_seconds: 120.0
  max_retries: 1

delivery:
  channels: [email]
  duplicate_prevention_enabled: true
  email:
    # Launch on Resend over SMTP (non-secret transport config). The sender
    # (smtp_from) is injected per the verified domain; the username/password are
    # SSM SecureString secrets (username "resend", password = Resend API key).
    smtp_host: smtp.resend.com
    smtp_port: 587
    start_tls: true

audit:
  # Immutable S3 audit store (Object Lock WORM). The bucket/region/KMS key are
  # injected as env vars by Terraform (MORNING_BRIEF_AUDIT__S3_BUCKET etc.);
  # backend: s3 with an unset bucket fails loud by design.
  backend: s3

observability:
  log_level: INFO
  json_logs: true
  metrics_enabled: true
