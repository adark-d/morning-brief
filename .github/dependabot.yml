# SHA pins never move on their own — updates arrive as grouped weekly PRs.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
  # Python deps: pip-audit gates known vulnerabilities; this keeps versions current.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]
