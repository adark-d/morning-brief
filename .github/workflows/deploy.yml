name: Deploy (batch Lambda)

# Builds the container image, pushes it to ECR, and rolls the batch Lambda to it.
# Auth is GitHub OIDC (no stored keys) via the role from infra/modules/cicd.
#
# Needs the `production` GitHub environment (deployment branches: main only) and the
# repository variables AWS_REGION, AWS_DEPLOY_ROLE_ARN, ECR_REPOSITORY, LAMBDA_FUNCTION
# (the last three are Terraform outputs — see docs/deployment-runbook.md).
#
# Rollback: revert the commit on main; this workflow redeploys it.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".dockerignore"

concurrency:
  group: deploy-prod
  cancel-in-progress: false # never cancel a deploy mid-roll

permissions:
  contents: read

jobs:
  # Same gate as CI — a deploy certifies the exact commit it ships, on any trigger.
  # Skipped (along with the dependent deploy) until the first terraform apply sets
  # AWS_DEPLOY_ROLE_ARN, so pre-infrastructure pushes no-op instead of failing.
  gate:
    if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' }}
    uses: ./.github/workflows/gate.yml

  deploy:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 30 # emulated arm64 builds are slow
    environment: production
    permissions:
      id-token: write # mint the OIDC token
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      # Tags are immutable and builds aren't reproducible — re-pushing a commit would
      # be rejected, so skip the build and roll the existing image instead.
      - name: Check for an existing image for this commit
        id: image
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          repository_name="${ECR_REPOSITORY#*/}"
          if output=$(aws ecr describe-images \
               --repository-name "$repository_name" \
               --image-ids imageTag="$GITHUB_SHA" 2>&1); then
            echo "Image $GITHUB_SHA already in ECR; the build will be skipped."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif echo "$output" | grep -q "ImageNotFoundException"; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "$output"
            exit 1
          fi

      # The Lambda function is arm64 (Graviton); build for that platform.
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        if: steps.image.outputs.exists == 'false'
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        if: steps.image.outputs.exists == 'false'

      - name: Build and push image
        if: steps.image.outputs.exists == 'false'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/arm64
          provenance: false # ECR rejects the OCI attestation manifest by default
          push: true
          tags: ${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

      # No --publish: the scheduler invokes $LATEST; versions would be dead weight.
      - name: Roll the Lambda to the new image
        env:
          FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION }}
          IMAGE_URI: ${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --image-uri "$IMAGE_URI"

      # update-function-code is async and can fail after returning — the deploy is
      # not done until the rollout reports Successful.
      - name: Verify the rollout
        env:
          FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION }}
        run: |
          if ! aws lambda wait function-updated-v2 --function-name "$FUNCTION_NAME"; then
            aws lambda get-function --function-name "$FUNCTION_NAME" \
              --query 'Configuration.[LastUpdateStatus,LastUpdateStatusReasonCode,LastUpdateStatusReason]' \
              --output text
            echo "::error::Lambda rollout did not reach LastUpdateStatus=Successful"
            exit 1
          fi
          aws lambda get-function --function-name "$FUNCTION_NAME" \
            --query 'Configuration.[State,LastUpdateStatus]' --output text
