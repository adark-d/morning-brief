name: Deploy (batch Lambda)

# Builds the container image, pushes it to ECR, and rolls the batch Lambda to it.
# Authenticates to AWS with GitHub OIDC (no stored keys) using the deploy role created
# by infra/modules/cicd. The first deploy is manual (see infra/README.md); thereafter
# this runs on a push to main or on demand.
#
# The deploy job runs in the `production` GitHub environment (Settings -> Environments).
# Create it with "Deployment branches" restricted to main: GitHub then refuses to start
# the job from any other ref, and the IAM trust policy only accepts OIDC tokens minted
# for that environment, so no other workflow, branch, or repo can assume the role.
#
# Required repository variables (Settings -> Variables -> Actions):
#   AWS_REGION           e.g. eu-west-2
#   AWS_DEPLOY_ROLE_ARN  output github_deploy_role_arn from infra/envs/prod
#   ECR_REPOSITORY       output ecr_repository_url from infra/envs/prod
#   LAMBDA_FUNCTION      output batch_function_name from infra/envs/prod
#
# Rollback: revert the offending commit on main and let this workflow redeploy.
# Every image is tagged with its commit SHA, so the audit trail of what ran when
# is the git history.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".dockerignore"

concurrency:
  group: deploy-prod
  cancel-in-progress: false # never cancel a deploy mid-roll

permissions:
  contents: read

jobs:
  # A deploy certifies exactly what it ships: the same gate CI runs on PRs runs
  # here, in front of the roll, whatever the trigger (push or manual dispatch).
  #
  # Skip until the infrastructure exists. AWS_DEPLOY_ROLE_ARN is a Terraform output,
  # set as a repo variable after the first `terraform apply`. Until then there is
  # nothing to deploy to, so the run is a clean no-op rather than failing on missing
  # credentials. It activates automatically once the variable is set; skipping the
  # gate also skips the dependent deploy job.
  gate:
    if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' }}
    uses: ./.github/workflows/gate.yml

  deploy:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 30 # emulated arm64 builds are slow, but not six-hours slow
    environment: production
    permissions:
      id-token: write # mint the OIDC token
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      # ECR tags are immutable and Docker builds are not byte-reproducible, so
      # rebuilding an already-pushed commit would be rejected at push time. Skip
      # the build instead: re-runs after a failed roll deploy the existing image.
      - name: Check for an existing image for this commit
        id: image
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          repository_name="${ECR_REPOSITORY#*/}"
          if output=$(aws ecr describe-images \
               --repository-name "$repository_name" \
               --image-ids imageTag="$GITHUB_SHA" 2>&1); then
            echo "Image $GITHUB_SHA already in ECR; the build will be skipped."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif echo "$output" | grep -q "ImageNotFoundException"; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "$output"
            exit 1
          fi

      # The Lambda function is arm64 (Graviton); build for that platform.
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        if: steps.image.outputs.exists == 'false'
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        if: steps.image.outputs.exists == 'false'

      - name: Build and push image
        if: steps.image.outputs.exists == 'false'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/arm64
          provenance: false # ECR rejects the OCI attestation manifest by default
          push: true
          tags: ${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

      # No --publish: the scheduler invokes $LATEST, so numbered versions would be
      # dead weight nothing references.
      - name: Roll the Lambda to the new image
        env:
          FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION }}
          IMAGE_URI: ${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --image-uri "$IMAGE_URI"

      # update-function-code is asynchronous: it returns while the rollout is still
      # InProgress, and the update can fail after that. The deploy is not done until
      # the function is confirmed to be running the new image.
      - name: Verify the rollout
        env:
          FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION }}
        run: |
          if ! aws lambda wait function-updated-v2 --function-name "$FUNCTION_NAME"; then
            aws lambda get-function --function-name "$FUNCTION_NAME" \
              --query 'Configuration.[LastUpdateStatus,LastUpdateStatusReasonCode,LastUpdateStatusReason]' \
              --output text
            echo "::error::Lambda rollout did not reach LastUpdateStatus=Successful"
            exit 1
          fi
          aws lambda get-function --function-name "$FUNCTION_NAME" \
            --query 'Configuration.[State,LastUpdateStatus]' --output text
